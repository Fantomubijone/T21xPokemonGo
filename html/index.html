<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <title>Homepage</title>
        <style>
            .header, .navbar {
                background-color: #ffffff !important;
            }
            .promotion_image {
                position: relative;
                width: 100%;
                height: 900px; 
                overflow: hidden;
            }
            .promotion_image img {
                position: absolute;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .btn {
                border-radius: 50px;
                padding-left: 20px;
                padding-right: 20px;
            }
        </style>
    </head>
    <body>
    <!---->
    <div class="header sticky-top">
        <nav class="navbar d-flex flex-wrapd-flex flex-wrap navbar bg-body-tertiary mx-5">
        <div class="container-fluid mx-5">
            <a class="navbar-brand" href="#">
                <img src="logo.png" alt="logo.png">
                Web Store
            </a>

            <div class="d-flex flex-wrapd-flex flex-wrap">
                <button type="button" class="btn btn-primary me-3 py-2">HOME</button>
                <button type="button" class="btn btn-outline-primary me-3">STORE</button>
                <button type="button" class="btn btn-outline-primary me-3">SIGN UP</button>
                <button type="button" class="btn btn-outline-primary">LOG IN</button>
            </div>
        </div>
        </nav>
    </div>

    <div class="main">
        <div class="promotion_image">
            <img src="image.png" class="img-fluid">
        </div>
    </div>
    <!---->
    </body>
</html>
